<!DOCTYPE html>
<html lang="en">
<head>
    <title>Cricket Game</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>🏏 Cricket Match Game</h1>

<div class="scoreboard">
    <p>Score: <span id="score">0</span></p>
    <p>Wickets: <span id="wickets">0</span></p>
    <p>Balls: <span id="balls">0</span></p>
</div>

<div class="buttons">
    <button onclick="playShot(1)">1 Run</button>
    <button onclick="playShot(2)">2 Runs</button>
    <button onclick="playShot(4)">4 Runs</button>
    <button onclick="playShot(6)">6 Runs</button>
</div>

<h2 id="result"></h2>

<script src="script.js"></script>
</body>
</html>
